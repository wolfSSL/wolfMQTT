name: wolfMQTT CMake Build Tests

on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        # Smoke-build the CMake project under each WOLFMQTT_MAX_QOS value
        # to keep the build-option plumbing exercised. "" means leave the
        # cache value at its 2 default.
        include:
          - name: "CMake default (MAX_QOS unset)"
            cmake_opts: ""
          - name: "CMake MAX_QOS=2"
            cmake_opts: "-DWOLFMQTT_V5=yes -DWOLFMQTT_BROKER=yes -DWOLFMQTT_MAX_QOS=2"
          - name: "CMake MAX_QOS=1"
            cmake_opts: "-DWOLFMQTT_V5=yes -DWOLFMQTT_BROKER=yes -DWOLFMQTT_MAX_QOS=1"
          - name: "CMake MAX_QOS=0"
            cmake_opts: "-DWOLFMQTT_V5=yes -DWOLFMQTT_BROKER=yes -DWOLFMQTT_MAX_QOS=0"

    steps:
# Install cmake
    - name: Install cmake
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake

#pull and build wolfssl (cached, keyed on the live wolfssl master commit)
    - name: Resolve wolfSSL master SHA
      id: wolfssl-sha
      run: |
        set -e
        sha=$(git ls-remote https://github.com/wolfssl/wolfssl refs/heads/master | cut -f1)
        if [ -z "$sha" ]; then echo "ERROR: failed to resolve wolfssl master SHA" >&2; exit 1; fi
        echo "sha=$sha" >> "$GITHUB_OUTPUT"

    - name: Cache wolfSSL
      id: cache-wolfssl
      uses: actions/cache@v4
      with:
        path: ~/wolfssl-install
        key: wolfssl-cmake-${{ steps.wolfssl-sha.outputs.sha }}

    - uses: actions/checkout@v4
      if: steps.cache-wolfssl.outputs.cache-hit != 'true'
      with:
        repository: wolfssl/wolfssl
        path: wolfssl
        ref: ${{ steps.wolfssl-sha.outputs.sha }}
    - name: Build wolfssl
      if: steps.cache-wolfssl.outputs.cache-hit != 'true'
      working-directory: ./wolfssl
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_INSTALL_PREFIX=$HOME/wolfssl-install ..
        cmake --build .
        cmake --install .

    - name: Install wolfSSL into /usr/local
      run: |
        sudo cp -a $HOME/wolfssl-install/. /usr/local/
        sudo ldconfig

#pull wolfMQTT
    - uses: actions/checkout@v4

#build wolfMQTT
    - name: "Build wolfMQTT (${{ matrix.name }})"
      run: |
        mkdir build
        cd build
        cmake ${{ matrix.cmake_opts }} ..
        cmake --build .
