name: Broker Build Test

on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build wolfSSL once per distinct configuration and populate the shared
  # cache. The matrix below covers every wolfssl_opts value used by the
  # broker build matrix. The build jobs `needs:` this job, so by the time
  # they run the cache is warm and each restores instead of rebuilding --
  # turning ~17 wolfSSL builds per run into 3, even on the first run.
  wolfssl:
    name: "Build wolfSSL (${{ matrix.label }})"
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "enckeys"
            config: "--enable-enckeys"
          - label: "opensslcoexist"
            config: "--enable-opensslcoexist"
          - label: "opensslcoexist+enckeys"
            config: "--enable-opensslcoexist --enable-enckeys"
    steps:
      - uses: actions/checkout@v4
      - name: Build and cache wolfSSL
        uses: ./.github/actions/build-wolfssl
        with:
          config: ${{ matrix.config }}

  build:
    needs: wolfssl
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Broker default (dynamic alloc)"
            cflags: ""
            wolfmqtt_opts: "--enable-broker"
          - name: "Broker static memory"
            cflags: "-DWOLFMQTT_STATIC_MEMORY"
            wolfmqtt_opts: "--enable-broker"
          - name: "Broker with TLS"
            cflags: ""
            wolfmqtt_opts: "--enable-broker --enable-tls"
          - name: "Broker with TLS (static memory)"
            cflags: "-DWOLFMQTT_STATIC_MEMORY"
            wolfmqtt_opts: "--enable-broker --enable-tls"
          - name: "Broker no logging"
            cflags: ""
            wolfmqtt_opts: "--enable-broker --disable-broker-log"
          - name: "Broker minimal (no log, no retained, no will, no wildcards, no auth)"
            cflags: ""
            wolfmqtt_opts: "--enable-broker --disable-broker-log --disable-broker-retained --disable-broker-will --disable-broker-wildcards --disable-broker-auth"
          - name: "Broker TLS-only (no insecure)"
            cflags: ""
            wolfmqtt_opts: "--enable-broker --enable-tls --disable-broker-insecure"
          - name: "Broker with WebSocket"
            cflags: ""
            wolfmqtt_opts: "--enable-broker --enable-websocket"
            extra_deps: "libwebsockets-dev"
            wolfssl_opts: "--enable-opensslcoexist"
          - name: "Broker with WebSocket + TLS"
            cflags: ""
            wolfmqtt_opts: "--enable-broker --enable-tls --enable-websocket"
            extra_deps: "libwebsockets-dev"
            wolfssl_opts: "--enable-opensslcoexist --enable-enckeys"
          # Maximum-QoS matrix. WOLFMQTT_MAX_QOS=2 is the default and runs
          # the full broker.test. The =1 and =0 caps are build-only (they
          # compile out the QoS 2 state machine, which broker.test
          # intentionally exercises); their compile coverage is provided by
          # cmake-build.yml's WOLFMQTT_MAX_QOS matrix, so they are not
          # duplicated here.
          - name: "Broker MAX_QOS=2 (default, full QoS)"
            cflags: ""
            wolfmqtt_opts: "--enable-v5 --enable-broker --enable-max-qos=2"
          - name: "Broker v5 (ordering / Receive Maximum)"
            cflags: ""
            wolfmqtt_opts: "--enable-broker --enable-v5"
          - name: "Broker v5 strict-serial (inflight=1)"
            cflags: "-DBROKER_MAX_INFLIGHT_PER_SUB=1"
            wolfmqtt_opts: "--enable-broker --enable-v5"
          - name: "Broker v5 static memory"
            cflags: "-DWOLFMQTT_STATIC_MEMORY"
            wolfmqtt_opts: "--enable-broker --enable-v5"
          - name: "Broker with persist"
            cflags: ""
            wolfmqtt_opts: "--enable-broker --enable-v5 --enable-broker-persist"
          - name: "Broker with persist + TLS"
            cflags: ""
            wolfmqtt_opts: "--enable-broker --enable-v5 --enable-broker-persist --enable-tls"
          - name: "Broker with persist + AES-GCM encryption"
            cflags: "-DWOLFMQTT_BROKER_PERSIST_ENCRYPT_DEV_KEY"
            wolfmqtt_opts: "--enable-broker --enable-v5 --enable-broker-persist --enable-broker-persist-encrypt"
          - name: "Broker with persist + static memory"
            cflags: "-DWOLFMQTT_STATIC_MEMORY"
            wolfmqtt_opts: "--enable-broker --enable-v5 --enable-broker-persist"

    steps:
    - name: Install dependencies
      run: |
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get update
        sudo apt-get install -y mosquitto-clients ${{ matrix.extra_deps }}

    - uses: actions/checkout@v4

    - name: Build and install wolfSSL
      uses: ./.github/actions/build-wolfssl
      with:
        config: ${{ matrix.wolfssl_opts || '--enable-enckeys' }}

    - name: wolfmqtt autogen
      run: ./autogen.sh

    - name: "wolfmqtt configure (${{ matrix.name }})"
      run: ./configure ${{ matrix.wolfmqtt_opts }} CFLAGS="${{ matrix.cflags }}"
    - name: wolfmqtt make
      run: make

    - name: "Run broker tests (${{ matrix.name }})"
      if: matrix.skip_broker_test != 'yes'
      run: ./scripts/broker.test

    - name: Show logs on failure
      if: failure() || cancelled()
      run: |
        ls -la /tmp/tmp.* 2>/dev/null || true
        for d in /tmp/tmp.*; do
          if [ -d "$d" ]; then
            echo "=== Logs in $d ==="
            cat "$d"/*.log 2>/dev/null || true
          fi
        done
