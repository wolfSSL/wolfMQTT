name: Sanitizer Tests

on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanitizer_test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      WOLFMQTT_NO_EXTERNAL_BROKER_TESTS: 1
    strategy:
      fail-fast: false
      matrix:
        # AddressSanitizer already performs leak detection at exit, so a
        # standalone LeakSanitizer job would be largely redundant.
        include:
          - name: "ASan"
            sanitizer_flags: "-fsanitize=address"
          - name: "UBSan"
            sanitizer_flags: "-fsanitize=undefined -fno-sanitize-recover=all"

    steps:
      - name: Workaround high-entropy ASLR
        run: sudo sysctl vm.mmap_rnd_bits=28

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y mosquitto bubblewrap

      - name: Setup mosquitto broker
        run: |
          sudo service mosquitto stop
          sleep 1

      - name: Checkout wolfMQTT
        uses: actions/checkout@v4

      - name: Build and install wolfSSL with ${{ matrix.name }}
        uses: ./.github/actions/build-wolfssl
        with:
          config: "--enable-enckeys"
          cc: "gcc ${{ matrix.sanitizer_flags }}"

      - name: Build wolfMQTT with ${{ matrix.name }}
        run: |
          ./autogen.sh
          ./configure CC="gcc ${{ matrix.sanitizer_flags }}"
          make -j$(nproc)

      - name: Run tests
        run: make check

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wolfmqtt-${{ matrix.name }}-logs
          path: |
            test-suite.log
            scripts/*.log
            config.log
          retention-days: 5
