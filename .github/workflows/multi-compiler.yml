name: Multi-Compiler Tests

on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compiler_test:
    name: ${{ matrix.cc }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Range endpoints of each compiler family; the middle versions
        # (gcc-12, clang-15) rarely surface anything the endpoints miss.
        include:
          - cc: gcc-11
          - cc: gcc-13
          - cc: clang-14
          - cc: clang-17

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cc }} autoconf automake libtool

      - name: Build and install wolfSSL
        uses: ./.github/actions/build-wolfssl
        with:
          config: "--enable-enckeys"

      - name: autogen
        run: ./autogen.sh

      - name: configure
        run: |
          # Add -Wno-gnu-zero-variadic-macro-arguments for clang (##__VA_ARGS__ is widely supported)
          EXTRA_CFLAGS=""
          if [[ "${{ matrix.cc }}" == clang* ]]; then
            EXTRA_CFLAGS="-Wno-gnu-zero-variadic-macro-arguments"
          fi
          CC=${{ matrix.cc }} ./configure \
            CFLAGS="-Wall -Wextra -Wpedantic $EXTRA_CFLAGS" \
            LDFLAGS="-L$HOME/wolfssl-install/lib" \
            CPPFLAGS="-I$HOME/wolfssl-install/include"

      - name: make
        run: make -j$(nproc)

      - name: make dist
        run: make dist

      - name: Show logs on failure
        if: failure()
        run: |
          cat config.log || true
