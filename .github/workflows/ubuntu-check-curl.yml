name: Ubuntu Build Test with Curl Support

on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-22.04
    # 10 min: runs 4 configure/make/make-check cycles plus a curl build.
    timeout-minutes: 10
    # Serialize with every other workflow that runs awsiot.test against
    # AWS IoT under the hard-coded "demoDevice" client ID. Without this,
    # parallel runs from sibling workflows clobber each other's MQTT
    # connections.
    concurrency:
      group: wolfmqtt-awsiot-external
      cancel-in-progress: false

    steps:
    - name: Install dependencies
      run: |
        # Don't prompt for anything
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get update
        # Install Dependencies
        sudo apt-get install -y mosquitto bubblewrap libpsl5 libpsl-dev

    - name: Setup mosquitto broker
      run: |
        # Disable default broker daemon
        sudo service mosquitto stop
        sleep 1

    # This is some debug info useful if something goes wrong
    - name: Show network status
      run: |
        sudo ifconfig
        sudo route
        sudo netstat -tulpan

    - uses: actions/checkout@v4

    - name: Build and install wolfSSL
      uses: ./.github/actions/build-wolfssl
      with:
        config: "--enable-curl"

    - uses: actions/checkout@v4
      with:
        repository: curl/curl
        path: curl
    - name: curl autoreconf
      working-directory: ./curl
      run: autoreconf -fi
    - name: curl configure
      working-directory: ./curl
      run: ./configure --with-wolfssl
    - name: curl make
      working-directory: ./curl
      run: make
    - name: curl make install
      working-directory: ./curl
      run: sudo make install

    - name: wolfmqtt autogen
      run: ./autogen.sh

    - name: wolfmqtt configure
      run: ./configure
    - name: wolfmqtt make
      run: make
    # Note: this will run the external tests for this CI only
    - name: wolfmqtt make check
      run: make check

    - name: wolfmqtt configure with libCurl Enabled
      env:
        WOLFMQTT_NO_EXTERNAL_BROKER_TESTS: 1
      run: ./configure --enable-curl
    - name: wolfmqtt make
      run: make
    - name: wolfmqtt make check
      run: make check

    - name: wolfmqtt configure with libCurl Enabled without TLS
      env:
        WOLFMQTT_NO_EXTERNAL_BROKER_TESTS: 1
      run: ./configure --enable-curl --disable-tls
    - name: wolfmqtt make
      run: make
    - name: wolfmqtt make check
      run: make check

    - name: wolfmqtt configure with libCurl and Stress
      env:
        WOLFMQTT_NO_EXTERNAL_BROKER_TESTS: 1
      run: ./configure --enable-curl --enable-stress
    - name: wolfmqtt make
      run: make
    - name: wolfmqtt make check
      run: make check

      # capture logs on failure
    - name: Show logs on failure
      if: failure() || cancelled()
      run: |
        cat test-suite.log
        cat scripts/*.log
